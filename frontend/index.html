<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Password Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="main">

    <!-- LEFT FORM -->
    <div class="form-section">
        <h1>🔐 Password Generator</h1>

        <label>Password Length</label>
        <input type="number" id="length" value="12" min="4">

        <div class="options">
            <label><input type="checkbox" id="upper" checked> Uppercase</label>
            <label><input type="checkbox" id="lower" checked> Lowercase</label>
            <label><input type="checkbox" id="numbers" checked> Numbers</label>
            <label><input type="checkbox" id="symbols"> Symbols</label>
        </div>

        <button onclick="generatePassword()">Generate Password</button>

        <div class="output">
            <input type="text" id="result" readonly>
            <button onclick="copyPassword()">📋</button>
        </div>

        <p id="strength"></p>
    </div>

    <!-- RIGHT IMAGE -->
    <div class="image-section">
        <div class="overlay-text">
            <h2>Secure Your Life 🔐</h2>
            <p>Strong passwords protect everything.</p>
        </div>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
